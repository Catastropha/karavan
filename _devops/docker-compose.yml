services:
  karavan:
    build:
      context: ..
      dockerfile: _devops/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - ../config.json:/opt/karavan/config.json:ro
      - ../repos:/opt/karavan/repos
      - /home/ubuntu/.ssh/id_ed25519:/tmp/ssh_key/id_ed25519:ro
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data

volumes:
  caddy_data:
